<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yum Pro OMS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; color: #333; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 500px; }
        h1 { color: #2c3e50; }
        .btn { padding: 12px 20px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #219150; }
        input, select { padding: 10px; margin: 10px 0; display: block; width: 95%; border: 1px solid #ddd; border-radius: 6px; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 4px; border-left: 5px solid #27ae60; }
    </style>
</head>
<body>

    <h1>🍔 Yum Pro OMS</h1>

    <div class="card">
        <h3>Register New Staff</h3>
        <input type="text" id="empName" placeholder="Full Name">
        <input type="text" id="empId" placeholder="Staff ID (e.g. 101)">
        <select id="empSector">
            <option value="Front">Front of House</option>
            <option value="Kitchen">Kitchen</option>
        </select>
        <select id="empRole">
            <option value="Waiter">Waiter</option>
            <option value="Chef">Chef</option>
            <option value="Manager">Manager</option>
        </select>
        <button class="btn" onclick="addEmployee()">Add Employee</button>
    </div>

    <div class="card">
        <h3>Active Staff Members</h3>
        <ul id="staffList"></ul>
    </div>

    <script>
        let employees = [];

        // LOAD DATA FROM REPLIT SERVER
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                employees = data.employees || [];
                renderStaff();
            } catch (err) {
                console.error("Connection Failed:", err);
            }
        }

        // SAVE DATA TO REPLIT SERVER
        async function updateServer(payload) {
            await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        function addEmployee() {
            const n = document.getElementById('empName').value;
            const id = document.getElementById('empId').value;
            const s = document.getElementById('empSector').value;
            const r = document.getElementById('empRole').value;

            if (n && id && s && r) {
                // --- DUPLICATE ID CHECK ---
                const isDuplicate = employees.some(emp => emp.id === id);
                
                if (isDuplicate) {
                    alert(`🚨 ERROR: Staff ID "${id}" is already assigned to another employee!`);
                    return; 
                }

                // Add to local array
                employees.push({ id: id, name: n, sector: s, role: r });
                
                // Sync with server
                updateServer({ employees });
                
                // Refresh list and clear inputs
                renderStaff();
                document.getElementById('empName').value = '';
                document.getElementById('empId').value = '';
            } else {
                alert("Please complete all fields.");
            }
        }

        function renderStaff() {
            const list = document.getElementById('staffList');
            list.innerHTML = employees.map(emp => 
                `<li><strong>ID: ${emp.id}</strong> — ${emp.name} (${emp.role})</li>`
            ).join('');
        }

        // Run on startup
        loadData();
    </script>
</body>
</html>
