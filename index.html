<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yum Pro - Local Server</title>
    <style>
        body { font-family: 'Trebuchet MS', sans-serif; background: #eceff1; padding: 20px; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-add:hover { background: #219150; }
        #staffList { margin-top: 20px; padding: 0; }
        .staff-item { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 5px; border-left: 4px solid #3498db; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🍔 Yum Pro Staff</h2>
        
        <input type="text" id="name" placeholder="Staff Name">
        <input type="text" id="sid" placeholder="Unique Staff ID (e.g. 5001)">
        
        <select id="role">
            <option value="Waiter">Waiter</option>
            <option value="Chef">Chef</option>
            <option value="Manager">Manager</option>
        </select>

        <button class="btn-add" onclick="saveStaff()">Register Staff</button>

        <div id="staffList"></div>
    </div>

    <script>
        let employees = [];

        // SYNC: Load data from your tablet's local server
        async function load() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                employees = data.employees || [];
                show();
            } catch (e) { console.log("Server not started yet."); }
        }

        async function saveStaff() {
            const n = document.getElementById('name').value;
            const id = document.getElementById('sid').value;
            const r = document.getElementById('role').value;

            if(!n || !id) return alert("Please fill Name and ID");

            // --- SECURITY: PREVENT DUPLICATE IDS ---
            const exists = employees.some(e => e.id === id);
            if (exists) {
                alert(`⚠️ ID ${id} is already in use by another staff member!`);
                return;
            }

            employees.push({ name: n, id: id, role: r });
            
            // Send to your local server.js
            await fetch('/api/data', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ employees })
            });

            document.getElementById('name').value = '';
            document.getElementById('sid').value = '';
            show();
        }

        function show() {
            const container = document.getElementById('staffList');
            container.innerHTML = employees.map(e => `
                <div class="staff-item">
                    <span><strong>${e.id}</strong>: ${e.name}</span>
                    <small>${e.role}</small>
                </div>
            `).join('');
        }

        load();
    </script>
</body>
</html>
