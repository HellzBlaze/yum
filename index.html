<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yum - Restaurant OMS</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --secondary: #2f3542;
            --text-dark: #2d3436;
            --card-bg: #ffffff;
            --border-radius: 12px;
            
            --color-pending: #ffeaa7;
            --color-received: #81ecec;
            --color-preparing: #fab1a0;
            --color-prepared: #55efc4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); height: 100vh; display: flex; flex-direction: column; }

        header { background-color: var(--primary); padding: 1rem; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 10; }

        nav { display: flex; justify-content: center; gap: 10px; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .tab-btn { padding: 10px 25px; border: none; background: #f1f2f6; cursor: pointer; border-radius: 25px; font-weight: bold; font-size: 1rem; color: var(--secondary); transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); }

        .tab-content { display: none; flex: 1; padding: 20px; max-width: 1400px; margin: 0 auto; width: 100%; overflow-y: auto; }
        .tab-content.active { display: block; }
        h2, h3 { color: var(--secondary); margin-bottom: 15px; }

        /* --- REGISTER TAB --- */
        #register-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: calc(100vh - 180px); }

        .cart-panel { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 20px; border: 2px solid #dfe4ea; }
        
        .cart-items-container { flex: 1; border: 2px solid #dfe4ea; border-radius: 12px; padding: 10px; overflow-y: auto; margin-bottom: 15px; background: #fcfcfc; }
        
        .cart-item { padding: 10px 0; border-bottom: 1px dashed #ccc; }
        .cart-item-header { display: flex; justify-content: space-between; font-weight: bold; }
        .cart-item-details { font-size: 0.85rem; color: #636e72; margin-top: 4px; }
        .cart-item-remove { background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-weight: bold;}

        .cart-totals { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .cart-totals div { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .tip-input { width: 80px; padding: 5px; font-size: 1.1rem; text-align: right; border: 1px solid #ccc; border-radius: 6px; }

        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid #2d3436; }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .right-panel { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; height: 100%; }
        .right-section { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #dfe4ea; overflow-y: auto; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .menu-btn { background: #1e90ff; color: white; border: 2px solid #2d3436; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.1s; }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn span { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        /* --- ORDER CARDS --- */
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .order-card { border-radius: 16px; padding: 15px; display: flex; flex-direction: column; border: 2px solid #2d3436; box-shadow: 0 4px 0px rgba(0,0,0,0.1); }
        
        .card-pending { background-color: var(--color-pending); }
        .card-received { background-color: var(--color-received); }
        .card-preparing { background-color: var(--color-preparing); }
        .card-prepared { background-color: var(--color-prepared); }

        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 8px; margin-bottom: 10px; }
        .order-no { font-size: 1.2rem; font-weight: 900; }
        .status-badge { background: white; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; border: 1px solid #2d3436;}
        
        .order-items-list { flex: 1; margin-bottom: 15px; font-size: 1rem; line-height: 1.4; }
        .order-item-note { font-size: 0.85rem; color: #d63031; font-style: italic; margin-left: 15px;}
        
        .card-actions { display: flex; gap: 5px; }
        .action-btn { flex: 1; background: var(--secondary); color: white; border: 2px solid #2d3436; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .cancel-btn { background: var(--primary); color: white; border: 2px solid #2d3436; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- MODAL / POPUP UI --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-overlay.active { display: flex; }
        
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 650px; display: flex; flex-direction: row; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 3px solid var(--secondary); }
        
        .modal-main { padding: 25px; flex: 2; display: flex; flex-direction: column; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
        
        .qty-row { display: flex; align-items: center; justify-content: space-between; background: #f1f2f6; padding: 10px 15px; border-radius: 12px; border: 2px solid #dfe4ea; }
        .qty-controls { display: flex; align-items: center; gap: 15px; font-size: 1.5rem; font-weight: bold; }
        .qty-btn { background: white; border: 2px solid var(--secondary); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.1s;}
        .qty-btn:active { transform: scale(0.9); }
        
        .note-area { display: flex; flex-direction: column; gap: 5px; }
        .note-area label { font-weight: bold; font-size: 1.1rem; }
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 12px; border: 2px solid #dfe4ea; resize: none; font-size: 1rem; }

        .modal-sidebar { background: #f8f9fa; padding: 25px; flex: 1; border-left: 3px solid var(--secondary); display: flex; flex-direction: column; }
        .modal-sidebar h3 { margin-bottom: 15px; color: var(--secondary); }
        .topping-list { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .topping-label { display: flex; align-items: center; gap: 8px; font-size: 1rem; cursor: pointer; }
        .topping-label input { transform: scale(1.3); }

        .modal-actions { display: flex; gap: 10px; margin-top: auto; }
        .btn-confirm { flex: 2; background: #2ed573; color: white; border: 2px solid var(--secondary); padding: 12px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-close { flex: 1; background: #ff4757; color: white; border: 2px solid var(--secondary); padding: 12px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--border-radius); overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #dfe4ea; }
        th { background: var(--secondary); color: white; }
    </style>
</head>
<body>

    <header><h1>Yum OMS</h1></header>

    <nav>
        <button class="tab-btn" onclick="switchTab('menu')">Menu Setup</button>
        <button class="tab-btn active" onclick="switchTab('register')">Register</button>
        <button class="tab-btn" onclick="switchTab('kitchen')">Kitchen</button>
        <button class="tab-btn" onclick="switchTab('sales')">Sales & Analytics</button>
    </nav>

    <main id="register" class="tab-content active">
        <div id="register-layout">
            <div class="cart-panel">
                <h3>Current Order</h3>
                <div class="cart-items-container" id="cartItemsList"></div>
                <div class="cart-totals">
                    <div><span>Subtotal:</span> <span>₹<span id="cartSubtotal">0</span></span></div>
                    <div><span>Tip:</span> <input type="number" id="cartTip" class="tip-input" value="0" min="0" oninput="updateCartUI()"></div>
                    <hr style="margin: 5px 0; border: 1px solid #dfe4ea;">
                    <div><span>Total:</span> <span style="color: var(--primary);">₹<span id="cartTotal">0</span></span></div>
                </div>
                <button class="submit-btn" onclick="submitOrder()">Submit Order</button>
            </div>

            <div class="right-panel">
                <div class="right-section">
                    <h3>Completed Orders (Ready for Pickup)</h3>
                    <div class="order-grid" id="completedOrdersGrid"></div>
                </div>
                <div class="right-section">
                    <h3>Items</h3>
                    <div class="menu-grid" id="posMenuGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <main id="kitchen" class="tab-content">
        <h2>Kitchen Queue</h2>
        <div class="order-grid" id="kitchenGrid"></div>
    </main>

    <main id="sales" class="tab-content">
        <h2>Sales History</h2>
        <table>
            <thead><tr><th>Order No</th><th>Items</th><th>Subtotal</th><th>Total</th><th>Status</th></tr></thead>
            <tbody id="salesTableBody"></tbody>
        </table>
    </main>

    <main id="menu" class="tab-content">
        <h2>Manage Menu Items</h2>
        <table style="max-width: 600px;">
            <thead><tr><th>Item Name</th><th>Price</th></tr></thead>
            <tbody id="menuAdminBody"></tbody>
        </table>
        <p style="margin-top: 15px; font-size: 0.9rem;">(Toppings are standard across items for this demo)</p>
    </main>

    <div class="modal-overlay" id="itemModal">
        <div class="modal-content">
            <div class="modal-main">
                <div class="modal-header">
                    <div class="modal-title" id="modalItemName">Item Name</div>
                </div>
                
                <div class="qty-row">
                    <span style="font-size: 1.2rem; font-weight: bold;">Quantity</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(-1)">−</button>
                        <span id="modalQty">1</span>
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                </div>

                <div class="note-area">
                    <label>Note (optional)</label>
                    <textarea id="modalNote" placeholder="e.g. Allergy info, sauce on side..."></textarea>
                </div>
            </div>

            <div class="modal-sidebar">
                <h3>Toppings IF any</h3>
                <div class="topping-list" id="modalToppingsList">
                    <label class="topping-label"><input type="checkbox" value="Extra Cheese" data-price="20"> Extra Cheese (+₹20)</label>
                    <label class="topping-label"><input type="checkbox" value="Spicy" data-price="0"> Make it Spicy</label>
                    <label class="topping-label"><input type="checkbox" value="No Onions" data-price="0"> No Onions</label>
                    <label class="topping-label"><input type="checkbox" value="Jain Prep" data-price="0"> Jain Prep</label>
                </div>
                <div class="modal-actions">
                    <button class="btn-close" onclick="closeModal()">Cancel</button>
                    <button class="btn-confirm" onclick="confirmItem()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let menuItems = JSON.parse(localStorage.getItem('yum_menu')) || [
            { id: 1, name: 'Burger', price: 150 }, { id: 2, name: 'Fries', price: 80 },
            { id: 3, name: 'Soda', price: 50 }, { id: 4, name: 'Pizza', price: 299 }
        ];
        let orders = JSON.parse(localStorage.getItem('yum_orders')) || [];
        let orderCounter = parseInt(localStorage.getItem('yum_counter')) || 100;
        let currentCart = []; 
        let activePopupItem = null;

        function saveData() {
            localStorage.setItem('yum_orders', JSON.stringify(orders));
            localStorage.setItem('yum_counter', orderCounter);
            renderAll();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            renderAll();
        }

        // --- Popup Logic ---
        function openModal(menuId) {
            activePopupItem = menuItems.find(m => m.id === menuId);
            if (!activePopupItem) return;
            
            document.getElementById('modalItemName').innerText = activePopupItem.name;
            document.getElementById('modalQty').innerText = '1';
            document.getElementById('modalNote').value = '';
            
            // Uncheck all toppings
            document.querySelectorAll('#modalToppingsList input').forEach(cb => cb.checked = false);
            
            document.getElementById('itemModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
            activePopupItem = null;
        }

        function changeQty(delta) {
            let qtySpan = document.getElementById('modalQty');
            let current = parseInt(qtySpan.innerText);
            if (current + delta >= 1) qtySpan.innerText = current + delta;
        }

        function confirmItem() {
            const qty = parseInt(document.getElementById('modalQty').innerText);
            const note = document.getElementById('modalNote').value.trim();
            
            const toppings = [];
            let toppingsPrice = 0;
            document.querySelectorAll('#modalToppingsList input:checked').forEach(cb => {
                toppings.push(cb.value);
                toppingsPrice += parseInt(cb.dataset.price);
            });

            const unitPrice = activePopupItem.price + toppingsPrice;
            const totalPrice = unitPrice * qty;

            // Grouping Check: If item exists with SAME exact note and toppings, just add qty.
            const existingItemIndex = currentCart.findIndex(item => 
                item.menuId === activePopupItem.id && 
                item.note === note && 
                JSON.stringify(item.toppings) === JSON.stringify(toppings)
            );

            if (existingItemIndex > -1) {
                currentCart[existingItemIndex].qty += qty;
                currentCart[existingItemIndex].totalPrice += totalPrice;
            } else {
                currentCart.push({
                    id: Date.now() + Math.random(),
                    menuId: activePopupItem.id,
                    name: activePopupItem.name,
                    qty: qty,
                    unitPrice: unitPrice,
                    totalPrice: totalPrice,
                    note: note,
                    toppings: toppings
                });
            }

            closeModal();
            updateCartUI();
        }

        // --- Cart Logic ---
        function removeFromCart(cartItemId) {
            currentCart = currentCart.filter(item => item.id !== cartItemId);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartItemsList');
            list.innerHTML = '';
            let subtotal = 0;

            currentCart.forEach(item => {
                subtotal += item.totalPrice;
                let detailsStr = [];
                if (item.toppings.length) detailsStr.push(item.toppings.join(', '));
                if (item.note) detailsStr.push(`Note: ${item.note}`);

                list.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-header">
                            <span>${item.qty}x ${item.name}</span>
                            <div>
                                <span>₹${item.totalPrice}</span>
                                <button class="cart-item-remove" onclick="removeFromCart(${item.id})">X</button>
                            </div>
                        </div>
                        ${detailsStr.length ? `<div class="cart-item-details">${detailsStr.join('<br>')}</div>` : ''}
                    </div>
                `;
            });

            const tip = parseFloat(document.getElementById('cartTip').value) || 0;
            document.getElementById('cartSubtotal').innerText = subtotal;
            document.getElementById('cartTotal').innerText = subtotal + tip;
        }

        function submitOrder() {
            if (currentCart.length === 0) return alert("Cart is empty!");

            const subtotal = currentCart.reduce((sum, item) => sum + item.totalPrice, 0);
            const tip = parseFloat(document.getElementById('cartTip').value) || 0;

            const newOrder = {
                id: ++orderCounter,
                items: [...currentCart],
                subtotal: subtotal,
                tip: tip,
                total: subtotal + tip,
                status: 'Pending',
                timestamp: new Date().getTime()
            };

            orders.push(newOrder);
            currentCart = []; // Clear Cart
            document.getElementById('cartTip').value = '0'; // Reset Tip
            
            saveData();
            updateCartUI(); // Re-render empty cart
        }

        function updateOrderStatus(orderId, newStatus) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                saveData();
            }
        }

        // --- Rendering ---
        const statusConfig = {
            'Pending': { next: 'Received', btn: 'Mark Received', color: 'card-pending' },
            'Received': { next: 'Preparing', btn: 'Mark Preparing', color: 'card-received' },
            'Preparing': { next: 'Prepared', btn: 'Mark Prepared', color: 'card-preparing' },
            'Prepared': { next: 'Collected', btn: 'Mark Collected', color: 'card-prepared' }
        };

        function buildCard(order, showNextButton = true) {
            const config = statusConfig[order.status];
            if (!config) return '';

            const itemsDisplay = order.items.map(i => {
                let text = `<b>${i.qty}x ${i.name}</b>`;
                if (i.toppings.length) text += `<br><span style="font-size:0.85em; color:#555;">+ ${i.toppings.join(', ')}</span>`;
                if (i.note) text += `<br><span class="order-item-note">"${i.note}"</span>`;
                return `<div style="margin-bottom:8px;">${text}</div>`;
            }).join('');

            let actionHtml = showNextButton && config.next ? `<button class="action-btn" onclick="updateOrderStatus(${order.id}, '${config.next}')">${config.btn}</button>` : '';

            return `
                <div class="order-card ${config.color}">
                    <div class="card-header">
                        <span class="order-no">#${order.id}</span>
                        <span class="status-badge">${order.status}</span>
                    </div>
                    <div class="order-items-list">${itemsDisplay}</div>
                    <div class="card-actions">
                        ${actionHtml}
                        <button class="cancel-btn" onclick="updateOrderStatus(${order.id}, 'Cancelled')">Cancel</button>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            document.getElementById('menuAdminBody').innerHTML = menuItems.map(item => `<tr><td>${item.name}</td><td>₹${item.price}</td></tr>`).join('');
            
            document.getElementById('posMenuGrid').innerHTML = menuItems.map(item => `
                <div class="menu-btn" onclick="openModal(${item.id})">${item.name} <span>₹${item.price}</span></div>
            `).join('');

            document.getElementById('kitchenGrid').innerHTML = '';
            document.getElementById('completedOrdersGrid').innerHTML = '';

            orders.forEach(order => {
                if (['Pending', 'Received', 'Preparing'].includes(order.status)) {
                    document.getElementById('kitchenGrid').innerHTML += buildCard(order);
                }
                if (order.status === 'Prepared') {
                    document.getElementById('completedOrdersGrid').innerHTML += buildCard(order);
                }
            });

            const salesTable = document.getElementById('salesTableBody');
            salesTable.innerHTML = '';
            [...orders].reverse().forEach(order => {
                let color = order.status === 'Cancelled' ? 'red' : (order.status === 'Collected' ? 'green' : 'black');
                let summary = order.items.map(i => `${i.qty}x ${i.name}`).join(', ');
                salesTable.innerHTML += `
                    <tr>
                        <td>#${order.id}</td>
                        <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${summary}">${summary}</td>
                        <td>₹${order.subtotal}</td>
                        <td><b>₹${order.total}</b></td>
                        <td style="color: ${color}; font-weight:bold;">${order.status}</td>
                    </tr>
                `;
            });
        }

        renderAll();
        updateCartUI();
    </script>
</body>
</html>
