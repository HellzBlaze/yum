<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yum Pro - P2P Sync Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-deep: #0f172a;
            --bg-surface: #1e293b;
            --bg-card: #334155;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(15, 23, 42, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: all 0.2s ease-out; }

        body { 
            background-color: var(--bg-deep); color: var(--text-main); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            background: var(--glass); backdrop-filter: blur(12px); padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 100;
        }

        h1 { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; color: var(--primary); text-transform: uppercase; }

        .header-status { 
            background: var(--bg-surface); padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; 
            font-weight: 600; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
        }

        nav { display: flex; justify-content: center; gap: 8px; padding: 12px; background: var(--bg-deep); border-bottom: 1px solid var(--border); }

        .tab-btn { 
            padding: 10px 20px; border: 1px solid transparent; background: transparent; cursor: pointer; 
            border-radius: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-dim);
        }
        .tab-btn:hover { color: var(--text-main); background: var(--bg-surface); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--primary-glow); }

        .tab-content { display: none; height: calc(100vh - 140px); padding: 24px; overflow-y: auto; }
        .tab-content.active { display: block; }

        #register-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; height: 100%; }

        .panel { 
            background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border); 
            padding: 24px; display: flex; flex-direction: column; overflow: hidden;
        }

        .right-panel { display: grid; grid-template-rows: 250px 1fr; gap: 20px; }

        .cart-items-container { flex: 1; margin: 16px 0; overflow-y: auto; padding-right: 8px; }
        .cart-item { padding: 12px; background: var(--bg-card); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .cart-item-header { display: flex; justify-content: space-between; font-weight: 600; align-items: center; }

        .cart-totals { border-top: 1px solid var(--border); padding-top: 16px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }

        .submit-btn { 
            background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; 
            font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 16px; 
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .menu-btn { 
            background: var(--bg-card); border: 1px solid var(--border); padding: 20px 12px; 
            border-radius: 16px; cursor: pointer; text-align: center;
        }

        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .order-card { background: var(--bg-surface); border-radius: 18px; border: 1px solid var(--border); padding: 20px; border-left: 6px solid var(--primary); }

        .lan-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .offline { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        input { background: var(--bg-deep); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div><span class="header-status" id="p2pStatus"><span class="lan-indicator offline" id="lanDot"></span>My ID: <b id="myPeerId">...</b></span></div>
        <h1>YUM PRO</h1>
        <div><span class="header-status" id="syncStatus" onclick="connectToPeer()">Connect to Peer ✎</span></div>
    </header>

    <nav>
        <button class="tab-btn active" onclick="switchTab('register', this)">Register</button>
        <button class="tab-btn" onclick="switchTab('kitchen', this)">Kitchen Queue</button>
        <button class="tab-btn" onclick="switchTab('settings', this)">Settings/Staff</button>
    </nav>

    <main id="register" class="tab-content active">
        <div id="register-layout">
            <div class="panel">
                <h3 style="font-weight: 800;">ACTIVE CART</h3>
                <div class="cart-items-container" id="cartItemsList"></div>
                <div class="cart-totals">
                    <div class="total-row" style="font-size: 1.6rem; color:var(--primary);"><span>Total</span><span>₹<span id="cartTotal">0</span></span></div>
                </div>
                <button class="submit-btn" onclick="submitOrder()">SUBMIT TO KITCHEN</button>
            </div>
            <div class="right-panel">
                <div class="panel"><h3>Pickup Ready</h3><div class="order-grid" id="pickupGrid"></div></div>
                <div class="panel"><h3>Menu</h3><div class="menu-grid" id="posMenuGrid"></div></div>
            </div>
        </div>
    </main>

    <main id="kitchen" class="tab-content">
        <h2 style="margin-bottom: 24px; font-weight: 800;">KITCHEN SCREEN</h2>
        <div class="order-grid" id="kitchenGrid"></div>
    </main>

    <main id="settings" class="tab-content">
        <div class="panel" style="max-width: 500px; margin: auto;">
            <h3>Add New Staff</h3>
            <p style="color: var(--text-dim); margin-bottom: 15px;">Duplicate IDs will be blocked.</p>
            <input type="text" id="empName" placeholder="Full Name">
            <input type="text" id="empId" placeholder="Unique Staff ID">
            <button class="submit-btn" onclick="addEmployee()">REGISTER STAFF</button>
            <h4 style="margin-top: 30px;">Current Staff List</h4>
            <div id="staffList" style="margin-top: 10px;"></div>
        </div>
    </main>

    <script>
        // --- PEER-TO-PEER DATA ENGINE ---
        let peer = new Peer();
        let conn = null;
        let state = {
            menuItems: [
                {id: 1, name: 'Burger', price: 150},
                {id: 2, name: 'Pizza', price: 350},
                {id: 3, name: 'Pasta', price: 200}
            ],
            employees: [],
            orders: [],
            adminPin: '1234'
        };

        peer.on('open', (id) => {
            document.getElementById('myPeerId').innerText = id;
        });

        // Receiving a connection
        peer.on('connection', (c) => {
            conn = c;
            setupSync();
        });

        function connectToPeer() {
            let remoteId = prompt("Enter ID from other tablet:");
            if(remoteId) {
                conn = peer.connect(remoteId);
                setupSync();
            }
        }

        function setupSync() {
            conn.on('open', () => {
                document.getElementById('lanDot').className = 'lan-indicator online';
                document.getElementById('syncStatus').innerText = "Connected!";
                broadcastData();
            });

            conn.on('data', (data) => {
                if (data.type === 'STATE_UPDATE') {
                    state = data.payload;
                    renderAll();
                }
            });
        }

        function broadcastData() {
            if (conn && conn.open) {
                conn.send({ type: 'STATE_UPDATE', payload: state });
            }
            renderAll();
        }

        // --- APP LOGIC ---
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function addEmployee() {
            const name = document.getElementById('empName').value;
            const id = document.getElementById('empId').value;
            if (name && id) {
                // DUPLICATE ID CHECK
                if (state.employees.some(e => e.id === id)) {
                    alert(`🚨 ERROR: Staff ID ${id} is already in use by another tablet!`);
                    return;
                }
                state.employees.push({id, name});
                document.getElementById('empName').value = '';
                document.getElementById('empId').value = '';
                broadcastData();
            }
        }

        let currentCart = [];
        function addToCart(id) {
            const item = state.menuItems.find(m => m.id === id);
            currentCart.push({name: item.name, price: item.price});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartItemsList').innerHTML = currentCart.map(i => `<div class="cart-item"><b>${i.name}</b> - ₹${i.price}</div>`).join('');
            document.getElementById('cartTotal').innerText = currentCart.reduce((a,b)=>a+b.price,0);
        }

        function submitOrder() {
            if(!currentCart.length) return;
            state.orders.push({id: Date.now(), items: [...currentCart], status: 'Pending'});
            currentCart = [];
            updateCartUI();
            broadcastData();
        }

        function updateOrderStatus(id, newStatus) {
            const order = state.orders.find(o => o.id === id);
            if(order) order.status = newStatus;
            broadcastData();
        }

        function renderAll() {
            // Menu
            document.getElementById('posMenuGrid').innerHTML = state.menuItems.map(m => `<div class="menu-btn" onclick="addToCart(${m.id})"><b>${m.name}</b><br><small>₹${m.price}</small></div>`).join('');
            
            // Staff List
            document.getElementById('staffList').innerHTML = state.employees.map(e => `<div style="background:var(--bg-card); padding:10px; margin:5px 0; border-radius:8px;">ID: ${e.id} | ${e.name}</div>`).join('');

            // Kitchen Queue
            document.getElementById('kitchenGrid').innerHTML = state.orders.filter(o => o.status === 'Pending').map(o => `
                <div class="order-card">
                    <b>#${o.id.toString().slice(-3)}</b>
                    <div style="margin: 10px 0;">${o.items.map(i => i.name).join(', ')}</div>
                    <button class="submit-btn" onclick="updateOrderStatus(${o.id}, 'Ready')">MARK READY</button>
                </div>
            `).join('');

            // Pickup List (Register Tab)
            document.getElementById('pickupGrid').innerHTML = state.orders.filter(o => o.status === 'Ready').map(o => `
                <div class="order-card" style="border-left-color:var(--success)">
                    <b>#${o.id.toString().slice(-3)}</b>
                    <div style="font-size:0.8rem; color:var(--success)">READY FOR PICKUP</div>
                    <button class="submit-btn" style="background:var(--success)" onclick="updateOrderStatus(${o.id}, 'Collected')">COLLECT</button>
                </div>
            `).join('');
        }

        renderAll();
    </script>
</body>
</html>
